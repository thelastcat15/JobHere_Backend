          schema:
            $ref: '#/definitions/utils.Response'
      summary: Get profile by UID
      tags:
      - Profile
    post:
      consumes:
      - application/json
      description: Create a new profile record
      parameters:
      - description: Profile payload
        in: body
        name: profile
