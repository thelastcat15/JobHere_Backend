              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.Response'
      summary: List parking
      tags:
      - Parking
    post:
      consumes:
      - application/json
      description: Create a new parking location
      parameters:
      - description: Parking payload
        in: body
        name: parking
        required: true
        schema:
          $ref: '#/definitions/models.CreateParkingRequest'
      produces:
