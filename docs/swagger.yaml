basePath: /api
definitions:
  models.Booking:
    properties:
      bookedTimeEnd:
        type: string
      bookedTimeStart:
        type: string
      createdAt:
        type: string
      duration_hours:
        type: number
      hourly_rate:
        type: number
      id:
        type: string
      parking:
        $ref: '#/definitions/models.Parking'
      parking_slot:
        $ref: '#/definitions/models.ParkingSlot'
      parking_zone:
        $ref: '#/definitions/models.ParkingZone'
      parkingID:
        type: string
      slotID:
        type: string
      status:
        $ref: '#/definitions/models.BookingStatus'
      total_cost:
        type: number
      updatedAt:
        type: string
      user:
        allOf:
        - $ref: '#/definitions/models.Profile'
        description: Relationships
      userID:
        type: string
      zoneID:
        type: string
    type: object
  models.BookingRequest:
    properties:
      parking_id:
        type: string
      slot_id:
        type: string
      zone_id:
        type: string
    required:
    - parking_id
    - slot_id
    - zone_id
    type: object
  models.BookingResponse:
    properties:
      booked_time_end:
        type: string
      booked_time_start:
        type: string
      duration_hours:
        type: number
      hourly_rate:
        type: number
      id:
        type: string
      parking:
        $ref: '#/definitions/models.ParkingInfo'
      slot:
        $ref: '#/definitions/models.SlotInfo'
      status:
        $ref: '#/definitions/models.BookingStatus'
      total_cost:
        type: number
      zone:
        $ref: '#/definitions/models.ZoneInfo'
    type: object
  models.BookingStatus:
    enum:
    - PENDING
    - ARRIVED
    - COMPLETED
    - CANCELLED
    type: string
    x-enum-comments:
      BookingArrived: ถึงแล้วรอจ่ายตัง (Arrived and waiting to pay)
      BookingCancelled: ยกเลิก (Cancelled)
      BookingCompleted: เสร็จสิ้น (Completed)
      BookingPending: จองอยู่ (Booking in progress)
    x-enum-descriptions:
    - จองอยู่ (Booking in progress)
    - ถึงแล้วรอจ่ายตัง (Arrived and waiting to pay)
    - เสร็จสิ้น (Completed)
    - ยกเลิก (Cancelled)
    x-enum-varnames:
    - BookingPending
    - BookingArrived
    - BookingCompleted
    - BookingCancelled
  models.CreateParkingRequest:
    properties:
      address:
        maxLength: 500
        minLength: 5
        type: string
      contact:
        maxLength: 100
        type: string
      coordinate_x:
        type: number
      coordinate_y:
        type: number
      description:
        type: string
      name:
        maxLength: 150
        type: string
      type:
        maxLength: 50
        type: string
    required:
    - address
    - coordinate_x
    - coordinate_y
    - name
    - type
    type: object
  models.Parking:
    properties:
      address:
        maxLength: 500
        minLength: 5
        type: string
      bookings:
        items:
          $ref: '#/definitions/models.Booking'
        type: array
      contact:
        maxLength: 100
        type: string
      coordinate_x:
        type: number
      coordinate_y:
        type: number
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      images:
        items:
          $ref: '#/definitions/models.PlaceImage'
        type: array
      name:
        maxLength: 150
        type: string
      parking_zones:
        description: Relationships
        items:
          $ref: '#/definitions/models.ParkingZone'
        type: array
      reports:
        items:
          $ref: '#/definitions/models.Report'
        type: array
      type:
        maxLength: 50
        type: string
      updated_at:
        type: string
    required:
    - address
    - coordinate_x
    - coordinate_y
    - name
    - type
    type: object
  models.ParkingDetailResponse:
    properties:
      address:
        type: string
      contact:
        type: string
      coordinate_x:
        type: number
      coordinate_y:
        type: number
      description:
        type: string
      id:
        type: string
      images:
        items:
          $ref: '#/definitions/models.PlaceImage'
        type: array
      name:
        type: string
      type:
        type: string
      zones:
        items:
          $ref: '#/definitions/models.ZoneInfo'
        type: array
    type: object
  models.ParkingInfo:
    properties:
      id:
        type: string
      name:
        type: string
    type: object
  models.ParkingResponse:
    properties:
      address:
        type: string
      available_slots:
        type: integer
      contact:
        type: string
      coordinate_x:
        type: number
      coordinate_y:
        type: number
      description:
        type: string
      id:
        type: string
      name:
        type: string
      type:
        type: string
    type: object
  models.ParkingSlot:
    properties:
      bookings:
        items:
          $ref: '#/definitions/models.Booking'
        type: array
      created_at:
        type: string
      id:
        type: string
      name:
        maxLength: 50
        type: string
      parking_zone:
        allOf:
        - $ref: '#/definitions/models.ParkingZone'
        description: Relationships
      reports:
        items:
          $ref: '#/definitions/models.Report'
        type: array
      sensors:
        items:
          $ref: '#/definitions/models.Sensor'
        type: array
      status:
        enum:
        - available
        - occupied
        - reserved
        type: string
      updated_at:
        type: string
      zoneID:
        type: string
    required:
    - name
    - status
    type: object
  models.ParkingSlotResponse:
    properties:
      id:
        type: string
      name:
        type: string
      status:
        type: string
      zone_id:
        type: string
    type: object
  models.ParkingZone:
    properties:
      bookings:
        items:
          $ref: '#/definitions/models.Booking'
        type: array
      created_at:
        type: string
      hour_rate:
        type: number
      id:
        type: string
      name:
        maxLength: 100
        type: string
      parking:
        allOf:
        - $ref: '#/definitions/models.Parking'
        description: Relationships
      parking_id:
        type: string
      parking_slots:
        items:
          $ref: '#/definitions/models.ParkingSlot'
        type: array
      reports:
        items:
          $ref: '#/definitions/models.Report'
        type: array
      updated_at:
        type: string
    required:
    - hour_rate
    - name
    type: object
  models.PlaceImage:
    properties:
      created_at:
        type: string
      id:
        type: string
      parking:
        allOf:
        - $ref: '#/definitions/models.Parking'
        description: Relationship
      parking_id:
        type: string
      path:
        maxLength: 500
        type: string
      updated_at:
        type: string
    required:
    - path
    type: object
  models.Profile:
    properties:
      created_at:
        type: string
      display_name:
        type: string
      email:
        type: string
      phone:
        type: string
      point:
        type: integer
      role:
        enum:
        - user
        - admin
        - guard
        type: string
      uid:
        type: string
      updated_at:
        type: string
    required:
    - display_name
    - email
    type: object
  models.Report:
    properties:
      content:
        maxLength: 2000
        minLength: 10
        type: string
      created_at:
        type: string
      id:
        type: string
      image:
        maxLength: 500
        type: string
      parking:
        $ref: '#/definitions/models.Parking'
      parking_id:
        type: string
      parking_slot:
        $ref: '#/definitions/models.ParkingSlot'
      parking_zone:
        $ref: '#/definitions/models.ParkingZone'
      slot_id:
        type: string
      state:
        allOf:
        - $ref: '#/definitions/models.ReportState'
        enum:
        - PENDING
        - APPROVED
        - REJECTED
      timestamp:
        type: string
      updated_at:
        type: string
      user:
        allOf:
        - $ref: '#/definitions/models.Profile'
        description: Relationships
      user_id:
        type: string
      zone_id:
        type: string
    required:
    - content
    - state
    type: object
  models.ReportState:
    enum:
    - PENDING
    - APPROVED
    - REJECTED
    type: string
    x-enum-varnames:
    - ReportPending
    - ReportApproved
    - ReportRejected
  models.Sensor:
    properties:
      created_at:
        type: string
      id:
        type: string
      name:
        maxLength: 100
        type: string
      parking_slot:
        allOf:
        - $ref: '#/definitions/models.ParkingSlot'
        description: Relationship
      slot_id:
        type: string
      updated_at:
        type: string
      url:
        maxLength: 500
        type: string
    required:
    - name
    - url
    type: object
  models.SlotInfo:
    properties:
      id:
        type: string
      name:
        type: string
    type: object
  models.UpdateParkingRequest:
    properties:
      address:
        maxLength: 500
        minLength: 5
        type: string
      contact:
        maxLength: 100
        type: string
      coordinate_x:
        type: number
      coordinate_y:
        type: number
      description:
        type: string
      name:
        maxLength: 150
        type: string
      type:
        maxLength: 50
        type: string
    type: object
  models.ZoneInfo:
    properties:
      hour_rate:
        type: number
      id:
        type: string
      name:
        type: string
    type: object
  utils.Response:
    properties:
      data: {}
      error: {}
      message:
        type: string
      status:
        type: integer
    type: object
host: localhost:5000
info:
  contact: {}
  description: This is a JodHere API documentation
  title: JodHere API
  version: "1.0"
paths:
  /api/v1:
    get:
      consumes:
      - application/json
      description: Returns a small index of API endpoints
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Welcome
      tags:
      - Health
  /api/v1/bookings:
    get:
      consumes:
      - application/json
      description: Retrieve all bookings for the authenticated user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/models.BookingResponse'
                  type: array
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.Response'
      summary: Get user bookings
      tags:
      - Booking
    post:
      consumes:
      - application/json
      description: Create a new parking slot booking (hourly rate charging starts
        immediately)
      parameters:
      - description: Booking request
        in: body
        name: booking
        required: true
        schema:
          $ref: '#/definitions/models.BookingRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/utils.Response'
            - properties:
                data:
                  $ref: '#/definitions/models.BookingResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/utils.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.Response'
      summary: Create booking
      tags:
      - Booking
  /api/v1/bookings/{id}:
    delete:
      consumes:
      - application/json
      description: Delete booking by ID (owner only)
      parameters:
      - description: Booking UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/utils.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.Response'
      summary: Delete booking
      tags:
      - Booking
    get:
      consumes:
      - application/json
      description: Retrieve booking by ID (owner only)
      parameters:
      - description: Booking UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.Response'
            - properties:
                data:
                  $ref: '#/definitions/models.BookingResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/utils.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.Response'
      summary: Get booking
      tags:
      - Booking
  /api/v1/bookings/{id}/cancel:
    post:
      consumes:
      - application/json
      description: Cancel pending booking and release slot
      parameters:
      - description: Booking UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/utils.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/utils.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.Response'
      summary: Cancel booking
      tags:
      - Booking
  /api/v1/bookings/{id}/checkin:
    post:
      consumes:
      - application/json
      description: Confirm that user has arrived at parking location and calculate
        parking cost
      parameters:
      - description: Booking UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
