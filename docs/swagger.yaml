          schema:
            $ref: '#/definitions/utils.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.Response'
      summary: Confirm user arrival at parking
      tags:
      - Booking
  /api/v1/bookings/{id}/complete:
    post:
      consumes:
      - application/json
      description: Complete payment for arrived booking and mark as completed, release
